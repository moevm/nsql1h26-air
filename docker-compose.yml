services:
  db:
    image: arangodb:3.12.0
    environment:
      ARANGO_ROOT_PASSWORD: rootpassword
      ARANGO_NO_AUTH: 0
    volumes:
      - arango_data:/var/lib/arangodb3
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "arangosh",
          "--server.endpoint",
          "http://localhost:8529",
          "--server.username",
          "root",
          "--server.password",
          "rootpassword",
          "--javascript.execute-string",
          "db._version()",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      ARANGO_URL: http://db:8529
      ARANGO_DB_NAME: breathing_exercises
      ARANGO_USERNAME: root
      ARANGO_PASSWORD: rootpassword
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:5173:80'
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

volumes:
  arango_data:

networks:
  app-network:
    driver: bridge
